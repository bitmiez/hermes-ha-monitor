type: custom:button-card
show_icon: false
show_name: false
show_state: false
tap_action:
  action: none
triggers_update:
- sensor.hermes_live_openai_codex_5h_remaining
- sensor.hermes_live_openai_codex_weekly_remaining
- sensor.hermes_live_openai_codex_limit_state
- sensor.hermes_live_host_cpu_usage
- sensor.hermes_live_host_ram_usage
- sensor.hermes_live_host_disk_root_usage
- sensor.hermes_live_host_disk_data_usage
- sensor.hermes_live_host_load_1m
- sensor.hermes_live_openai_codex_auth1_login
- sensor.hermes_live_openai_codex_auth1_quota_state
- sensor.hermes_live_openai_codex_auth2_login
- sensor.hermes_live_openai_codex_auth2_quota_state
- sensor.hermes_live_openai_codex_fallback_state
- sensor.hermes_live_openai_codex_current_account
- sensor.hermes_live_host_uptime_seconds
- sensor.hermes_live_host_iowait_usage
- sensor.hermes_live_host_cpu_core_0_usage
- sensor.hermes_live_host_cpu_core_1_usage
- sensor.hermes_live_host_cpu_core_2_usage
styles:
  card:
  - position:relative
  - box-sizing:border-box
  - width:100%
  - max-width:100%
  - min-width:0
  - padding:0
  - margin:0
  - background:transparent
  - box-shadow:none
  - border:none
  - overflow:visible
  - text-align:left
  grid:
  - display:grid
  - grid-template-areas:"content"
  - grid-template-columns:minmax(0,1fr)
  - grid-template-rows:auto
  - width:100%
  - max-width:100%
  - min-width:0
  - padding:0
  - margin:0
  - align-items:stretch
  - justify-items:stretch
  - overflow:visible
  - text-align:left
  custom_fields:
    content:
    - grid-area:content
    - grid-column:1 / -1
    - grid-row:1 / 2
    - place-self:stretch stretch
    - justify-self:stretch
    - align-self:stretch
    - display:block
    - box-sizing:border-box
    - width:100%
    - max-width:100%
    - min-width:0
    - padding:0
    - margin:0
    - overflow:visible
    - text-align:left
  icon:
  - display:none
  img_cell:
  - display:none
  name:
  - display:none
  state:
  - display:none
  label:
  - display:none
custom_fields:
  content: "[[[\n    const S=(id)=>states[id];\n    const state=(id)=>S(id)?.state ?? '—';\n    const num=(id)=>{ const n=parseFloat(state(id));\
    \ return isNaN(n)?0:Math.max(0,Math.min(100,n)); };\n    const attr=(id,k,fb='')=>S(id)?.attributes?.[k] ?? fb;\n    const\
    \ section=(title,icon,body)=>`<div style=\"border-top:1px solid rgba(255,255,255,.08);padding-top:15px;margin-top:16px;text-align:left;width:100%;max-width:100%;box-sizing:border-box\"\
    ><div style=\"display:grid;grid-template-columns:18px minmax(0,1fr);column-gap:9px;align-items:center;justify-items:start;color:#f2f2f2;font-size:15px;font-weight:750;margin-bottom:12px;text-align:left;width:100%;max-width:100%;box-sizing:border-box\"\
    ><ha-icon icon=\"${icon}\" style=\"width:18px;height:18px;color:#ddd;display:block;justify-self:start\"></ha-icon><span\
    \ style=\"display:block;justify-self:start;text-align:left;white-space:normal\">${title}</span></div>${body}</div>`;\n\
    \        const bar=(label,id)=>{ const v=Math.round(num(id)); const r=attr(id,'reset_display'); const c=v>=80?'#58d26b':(v>=35?'#f0b84a':'#ff5f5f');\
    \ return `<div style=\"margin-top:12px;text-align:left;width:100%;max-width:100%;box-sizing:border-box;width:100%;max-width:100%;box-sizing:border-box\"\
    ><div style=\"display:grid;grid-template-columns:minmax(0,1fr) auto auto;width:100%;max-width:100%;column-gap:12px;margin-bottom:7px;align-items:baseline;text-align:left\"\
    ><b style=\"color:#fff;font-size:15px;text-align:left\">${label}</b><span style=\"color:#d6d6d6;font-size:14px;white-space:nowrap;text-align:left\"\
    >${v}%</span><span style=\"color:#d6d6d6;font-size:14px;white-space:nowrap;text-align:left\">${r}</span></div><div style=\"\
    height:10px;background:#303030;border-radius:999px;overflow:visible\"><div style=\"height:100%;width:${v}%;background:${c};border-radius:999px\"\
    ></div></div></div>`; };\n    const hostbar=(label,id)=>{ const v=Math.round(num(id)); const c=v>=90?'#ff5f5f':(v>=75?'#f0b84a':'#58d26b');\
    \ return `<div style=\"margin-top:11px;text-align:left;width:100%;max-width:100%;box-sizing:border-box;width:100%;max-width:100%;box-sizing:border-box\"\
    ><div style=\"display:grid;grid-template-columns:minmax(0,1fr) auto;width:100%;max-width:100%;margin-bottom:6px;font-size:14px;text-align:left\"\
    ><b style=\"color:#fff;text-align:left\">${label}</b><span style=\"color:#ddd;text-align:left\">${v}%</span></div><div\
    \ style=\"height:8px;background:#303030;border-radius:999px;overflow:visible\"><div style=\"height:100%;width:${v}%;background:${c};border-radius:999px\"\
    ></div></div></div>`; };\n    const coreBars=()=>{ const ids=['sensor.hermes_live_host_cpu_core_0_usage','sensor.hermes_live_host_cpu_core_1_usage','sensor.hermes_live_host_cpu_core_2_usage'];\
    \ return `<div style=\"display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px;width:100%;max-width:100%;margin-top:7px;margin-bottom:2px;box-sizing:border-box\"\
    >${ids.map((id,i)=>{ const v=Math.round(num(id)); const c=v>=90?'#ff5f5f':(v>=75?'#f0b84a':'#58d26b'); return `<div style=\"\
    min-width:0\"><div style=\"display:flex;justify-content:space-between;gap:4px;font-size:10px;line-height:12px;color:#aaa;margin-bottom:3px\"\
    ><span>K${i+1}</span><b style=\"color:#ddd\">${v}%</b></div><div style=\"height:5px;background:#303030;border-radius:999px;overflow:hidden\"\
    ><div style=\"height:100%;width:${v}%;background:${c};border-radius:999px\"></div></div></div>`; }).join('')}</div>`;\
    \ };\n    const authLine=(idx,role)=>{ const login=state(`sensor.hermes_live_openai_codex_auth${idx}_login`); const quota=state(`sensor.hermes_live_openai_codex_auth${idx}_quota_state`);\
    \ const c=quota==='429'?'#ff5f5f':(login==='ok'?'#58d26b':'#ff5f5f'); return `<div style=\"display:grid;grid-template-columns:54px\
    \ 70px minmax(0,1fr);width:100%;max-width:100%;gap:8px;align-items:center;margin-top:8px;font-size:14px;line-height:18px;text-align:left\"\
    ><b style=\"color:#fff;text-align:left\">Auth${idx}</b><span style=\"color:#aaa;text-align:left\">${role}</span><span\
    \ style=\"color:${c};white-space:nowrap;text-align:left\">Login ${login} · Quota ${quota}</span></div>`; };\n    const\
    \ fallback=state('sensor.hermes_live_openai_codex_fallback_state'); const fAttr=S('sensor.hermes_live_openai_codex_fallback_state')?.attributes||{};\
    \ const p429=fAttr.primary_429===true; const fColor=fallback==='active'?'#58d26b':'#aaa';\n    const quotaBody=`${bar('5\
    \ Std.','sensor.hermes_live_openai_codex_5h_remaining')}${bar('Wöchentlich','sensor.hermes_live_openai_codex_weekly_remaining')}<div\
    \ style=\"display:grid;grid-template-columns:minmax(0,1fr) auto;width:100%;max-width:100%;margin-top:12px;padding-top:10px;border-top:1px\
    \ solid rgba(255,255,255,.06);font-size:13px;color:#aaa;text-align:left\"><span>Restkontingent</span><b style=\"color:#58d26b\"\
    >${state('sensor.hermes_live_openai_codex_limit_state')}</b></div>`;\n    const hostBody=`${hostbar('CPU','sensor.hermes_live_host_cpu_usage')}${coreBars()}${hostbar('I/O\
    \ wait','sensor.hermes_live_host_iowait_usage')}${hostbar('RAM','sensor.hermes_live_host_ram_usage')}${hostbar('Disk /','sensor.hermes_live_host_disk_root_usage')}${hostbar('Disk\
    \ /data','sensor.hermes_live_host_disk_data_usage')}<div style=\"display:grid;grid-template-columns:minmax(0,1fr) auto;width:100%;max-width:100%;margin-top:12px;padding-top:10px;border-top:1px\
    \ solid rgba(255,255,255,.06);font-size:13px;color:#aaa;text-align:left\"><span>Load 1m</span><b style=\"color:#fff\"\
    >${state('sensor.hermes_live_host_load_1m')}</b></div>`;\n    const authBody=`<div style=\"display:grid;grid-template-columns:minmax(0,1fr)\
    \ auto;width:100%;max-width:100%;gap:12px;font-size:13px;color:#aaa;text-align:left\"><span>Aktiver CLI-Login</span><span\
    \ style=\"color:#fff;overflow:visible;text-overflow:ellipsis;white-space:nowrap\">${state('sensor.hermes_live_openai_codex_current_account')}</span></div>${authLine(1,'Primär')}${authLine(2,'Fallback')}<div\
    \ style=\"display:grid;grid-template-columns:minmax(0,1fr) auto;width:100%;max-width:100%;margin-top:12px;padding-top:10px;border-top:1px\
    \ solid rgba(255,255,255,.06);font-size:13px;color:#aaa;text-align:left\"><span>Fallback bei Auth1-429</span><b style=\"\
    color:${fColor}\">${fallback}</b></div><div style=\"display:grid;grid-template-columns:minmax(0,1fr) auto;width:100%;max-width:100%;margin-top:7px;font-size:13px;color:#aaa;text-align:left\"\
    ><span>Auth1 429</span><b style=\"color:${p429?'#ff5f5f':'#58d26b'}\">${p429?'ja':'nein'}</b></div>`;\n    return `<div\
    \ style=\"box-sizing:border-box;display:block;width:100%;max-width:100%;min-width:100%;margin:0;padding:18px 18px 18px\
    \ 8px;background:#171717;border:1px solid rgba(255,255,255,.08);border-radius:18px;color:#eee;font-family:var(--primary-font-family);text-align:left;overflow:visible\"\
    >\n      <div style=\"position:relative;min-height:48px;display:flex;align-items:center;justify-content:center;text-align:center;width:100%;max-width:100%;box-sizing:border-box;padding:0\
    \ 34px\"><ha-icon icon=\"mdi:robot-happy\" style=\"position:absolute;left:0;top:50%;transform:translateY(-50%);width:25px;height:25px;color:#d163ff\"\
    ></ha-icon><div style=\"text-align:center;justify-self:center;max-width:100%;min-width:0\"><div style=\"font-size:23px;line-height:25px;font-weight:850;color:#fff;text-align:center\"\
    >Hermes Monitor</div><div style=\"margin-top:4px;font-size:13px;line-height:16px;color:#aaa;text-align:center;white-space:normal\"\
    >Kontingent · Serverauslastung · Login/Fallback</div></div></div>\n      ${section('Verbleibendes Kontingent','mdi:speedometer',quotaBody)}\n\
    \      ${section('Server-Auslastung','mdi:server',hostBody)}\n      ${section('OpenAI-Codex Auth / Fallback','mdi:account-key',authBody)}\n\
    \    </div>`;\n  ]]]"
extra_styles: "\n#container, #grid, .grid {\n  display: grid !important;\n  grid-template-areas: \"content\" !important;\n\
  \  grid-template-columns: minmax(0, 1fr) !important;\n  grid-template-rows: auto !important;\n  width: 100% !important;\n\
  \  max-width: 100% !important;\n  min-width: 0 !important;\n  padding: 0 !important;\n  margin: 0 !important;\n  justify-items:\
  \ stretch !important;\n  align-items: stretch !important;\n}\n#content, [id=\"content\"] {\n  grid-area: content !important;\n\
  \  grid-column: 1 / -1 !important;\n  grid-row: 1 / 2 !important;\n  display: block !important;\n  box-sizing: border-box\
  \ !important;\n  width: 100% !important;\n  max-width: 100% !important;\n  min-width: 0 !important;\n  padding: 0 !important;\n\
  \  margin: 0 !important;\n  justify-self: stretch !important;\n  align-self: stretch !important;\n  text-align: left !important;\n\
  \  overflow: visible !important;\n}\n"
